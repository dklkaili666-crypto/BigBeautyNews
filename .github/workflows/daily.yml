name: BigBeautyNews Daily

on:
  schedule:
    # 主触发：UTC 23:45 = 北京时间次日 7:45
    - cron: '45 23 * * *'
    # 兜底触发：UTC 00:15 = 北京时间 8:15
    - cron: '15 0 * * *'
    # 云端调度冗余：降低 GitHub schedule 漏触发导致整天不推送的概率
    - cron: '35 0 * * *'
    - cron: '55 0 * * *'
    - cron: '20 1 * * *'
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force WeChat push even if today was already pushed'
        required: false
        default: 'false'
      push_test:
        description: 'Only send a ServerChan smoke test message'
        required: false
        default: 'false'
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bigbeautynews-daily
  cancel-in-progress: false

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.actor == github.repository_owner &&
          github.event_name == 'issues' &&
          (
            contains(github.event.issue.title, 'manual-push') ||
            contains(github.event.issue.body, '/push')
          )
        ) ||
        (
          github.actor == github.repository_owner &&
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '/push')
        )
      }}
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh repository state
        run: git pull --ff-only origin master

      - name: Check whether today's digest was already pushed
        id: push-check
        shell: bash
        run: |
          today=$(TZ=Asia/Shanghai date +%F)
          if [[ "${{ github.event_name }}" == "schedule" ]] \
            && jq -e --arg today "$today" '.dates | index($today) != null' data/push-history.json > /dev/null; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "$today has already been pushed; skipping the fallback run."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.push-check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.push-check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run BigBeautyNews
        if: >-
          ${{
            steps.push-check.outputs.should_run == 'true' &&
            !(github.event_name == 'workflow_dispatch' && inputs.push_test == 'true')
          }}
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          FORCE_PUSH: >-
            ${{
              (github.event_name == 'workflow_dispatch' && inputs.force_push == 'true') ||
              (github.event_name == 'issues' && contains(github.event.issue.body, '/push-force')) ||
              (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/push-force'))
            }}
        run: |
          if [[ "$FORCE_PUSH" == "true" ]]; then
            python src/main.py --force-push
          else
            python src/main.py
          fi

      - name: Run ServerChan smoke test
        if: >-
          ${{
            steps.push-check.outputs.should_run == 'true' &&
            github.event_name == 'workflow_dispatch' &&
            inputs.push_test == 'true'
          }}
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: PYTHONPATH=src python -m outputs.serverchan --test

      - name: Commit & Push data
        if: >-
          ${{
            success() &&
            steps.push-check.outputs.should_run == 'true' &&
            !(github.event_name == 'workflow_dispatch' && inputs.push_test == 'true')
          }}
        run: |
          git config user.name "BigBeautyNews Bot"
          git config user.email "bot@bigbeautynews.local"
          PYTHONPATH=src python -c "from outputs.status import mark_latest_run_committed; mark_latest_run_committed('data')"
          git add data/ web/data.json
          git diff --staged --quiet || git commit -m "📰 $(date +%Y-%m-%d) 每日AI 5件事"
          git push

      - name: Prepare Pages artifact
        if: >-
          ${{
            success() &&
            steps.push-check.outputs.should_run == 'true' &&
            !(github.event_name == 'workflow_dispatch' && inputs.push_test == 'true')
          }}
        run: |
          mkdir -p _site/web _site/data
          cp web/index.html web/style.css web/app.js web/data.json _site/web/
          cp -r data/archive _site/data/
          touch _site/.nojekyll

      - name: Configure Pages
        if: >-
          ${{
            success() &&
            steps.push-check.outputs.should_run == 'true' &&
            !(github.event_name == 'workflow_dispatch' && inputs.push_test == 'true')
          }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: >-
          ${{
            success() &&
            steps.push-check.outputs.should_run == 'true' &&
            !(github.event_name == 'workflow_dispatch' && inputs.push_test == 'true')
          }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy Pages
        if: >-
          ${{
            success() &&
            steps.push-check.outputs.should_run == 'true' &&
            !(github.event_name == 'workflow_dispatch' && inputs.push_test == 'true')
          }}
        uses: actions/deploy-pages@v4
        id: deployment
